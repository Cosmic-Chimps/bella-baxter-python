[build-system]
requires = ["setuptools>=65", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "bella-baxter-django"
version = "0.1.1-preview.14"
description = "Django integration for the Bella Baxter secret management SDK"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.9"
keywords = ["bella-baxter", "django", "secrets", "config"]
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Framework :: Django",
]
dependencies = [
    "bella-baxter>=0.1.0",
    "django>=3.2",
]

[project.optional-dependencies]
dev = ["pytest>=7", "pytest-django>=4"]

[project.urls]
Homepage = "https://bella-baxter.io"
Repository = "https://github.com/cosmic-chimps/bella-baxter-python"
Documentation = "https://docs.bella-baxter.io"

[tool.setuptools.packages.find]
where = ["src"]
