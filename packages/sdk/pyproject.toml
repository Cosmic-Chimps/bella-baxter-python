[build-system]
requires = ["setuptools>=65", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "bella-baxter"
version = "0.1.1-preview.23"
description = "Python SDK for the Bella Baxter secret management platform"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.9"
keywords = ["bella-baxter", "secrets", "config", "sdk"]
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]
dependencies = [
    "httpx>=0.25.0",
    "cryptography>=41.0.0",
    "microsoft-kiota-abstractions>=1.0.0",
    "microsoft-kiota-http>=1.0.0",
    "microsoft-kiota-serialization-json>=1.0.0",
    "microsoft-kiota-serialization-form>=1.0.0",
    "microsoft-kiota-serialization-text>=1.0.0",
    "microsoft-kiota-serialization-multipart>=1.0.0",
]

[project.optional-dependencies]
dev = ["pytest>=7", "pytest-asyncio>=0.21", "respx>=0.20"]

[project.urls]
Homepage = "https://bella-baxter.io"
Repository = "https://github.com/cosmic-chimps/bella-baxter-python"
Documentation = "https://docs.bella-baxter.io"

[tool.setuptools.packages.find]
where = ["src"]
